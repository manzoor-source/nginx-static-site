name: Test, Build and Push Container Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Check required files exist
        run: |
             test -f index.html || (echo "Missing index.html" && exit 1)
             test -f style.css || (echo "Missing style.css" && exit 1)
             echo "All required files present."

  
      - name: Validate HTML
        run: |
             pip3 install html5validator
             html5validator --root . --match "*.html"   
        
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          podman build -t ghcr.io/${{ github.repository_owner }}/nginx-static-site -f Containerfile .

      - name: Push image to GHCR
        run: |
          podman push ghcr.io/${{ github.repository_owner }}/nginx-static-site